# ==========================================================
# Configuracion de la pasarela SmartStock360 (Spring Boot)
# ==========================================================
spring.application.name=smartstock-gateway
server.port=8080

# URL base del servicio Python FastAPI (modelo IA ya entrenado)
python.api.base-url=http://localhost:8001

# Origen permitido para el frontend React (Vite)
app.cors.allowed-origin=http://localhost:5173

# Timeouts del RestTemplate hacia Python (milisegundos)
python.api.connect-timeout=3000
python.api.read-timeout=5000

# Log legible en consola para la demo
logging.level.com.utp.smartstock=INFO
